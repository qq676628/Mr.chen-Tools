<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel 数据提取工具</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .upload-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 25px;
        }
        .upload-area {
            border: 2px dashed #667eea;
            padding: 40px;
            text-align: center;
            border-radius: 8px;            cursor: pointer;
            transition: all 0.3s;
            background: white;
        }
        .upload-area:hover {
            background: #f0f4ff;
            border-color: #764ba2;
        }
        .upload-area.dragover {
            background: #e8eeff;
            border-color: #764ba2;
            transform: scale(1.02);
        }
        input[type="file"] {
            display: none;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        .btn-success:hover {
            box-shadow: 0 5px 15px rgba(17, 153, 142, 0.4);
        }
        .btn-group {
            text-align: center;
            margin-top: 20px;
        }
        #log {
            margin: 20px 0;
            max-height: 150px;
            overflow-y: auto;            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            font-size: 14px;
            display: none;
        }
        .status-item {
            padding: 5px 0;
            border-bottom: 1px solid #eee;
        }
        .success { color: #11998e; }
        .error { color: #e74c3c; }
        
        /* 预览表格样式 */
        .preview-section {
            display: none;
            margin-top: 30px;
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .preview-title {
            font-size: 20px;
            color: #333;
            font-weight: 600;
        }
        .stats {
            background: #f0f4ff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            color: #667eea;
        }
        .table-container {
            overflow-x: auto;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        table {
            width: 100%;            border-collapse: collapse;
            background: white;
            font-size: 14px;
        }
        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
        }
        tbody tr:hover {
            background: #f8f9fa;
        }
        tbody tr:nth-child(even) {
            background: #fafbfc;
        }
        .not-found {
            color: #999;
            font-style: italic;
        }
        .highlight {
            background: #fff3cd !important;
        }
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            th, td {
                padding: 8px 10px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 Excel 数据提取工具</h1>
    <p class="subtitle">提取字段：<b>姓名</b>、<b>身份证号</b>、<b>月收入</b></p>

    <div class="upload-section">        <label class="upload-area" id="dropZone">
            <div style="font-size: 48px; margin-bottom: 10px;">📁</div>
            <div style="font-size: 16px; color: #667eea; margin-bottom: 5px;">
                点击或拖拽文件到此处
            </div>
            <div style="font-size: 12px; color: #999;">
                支持 .xlsx, .xls 格式，可多选
            </div>
            <input type="file" id="fileInput" multiple accept=".xlsx, .xls">
        </label>
        
        <div id="log"></div>
        
        <div class="btn-group">
            <button class="btn" id="processBtn" onclick="processFiles()">
                🔍 提取数据并预览
            </button>
        </div>
    </div>

    <!-- 预览区域 -->
    <div class="preview-section" id="previewSection">
        <div class="preview-header">
            <div class="preview-title">📋 提取结果预览</div>
            <div class="stats" id="statsText"></div>
        </div>
        <div class="table-container">
            <table id="previewTable">
                <thead>
                    <tr>
                        <th>序号</th>
                        <th>文件名</th>
                        <th>姓名</th>
                        <th>身份证号</th>
                        <th>月收入</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
        </div>
        <div class="btn-group">
            <button class="btn btn-success" onclick="downloadExcel()">
                💾 下载 Excel 文件
            </button>
            <button class="btn" onclick="resetAll()">
                🔄 重新提取
            </button>
        </div>
    </div></div>

<script>
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const logDiv = document.getElementById('log');
    const processBtn = document.getElementById('processBtn');
    const previewSection = document.getElementById('previewSection');
    const tableBody = document.getElementById('tableBody');
    const statsText = document.getElementById('statsText');
    
    let extractedData = [];
    let allFiles = [];

    // 拖拽功能
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        const files = e.dataTransfer.files;
        if (files.length > 0) {
            fileInput.files = files;
            updateFileCount(files.length);
        }
    });

    fileInput.addEventListener('change', function(e) {
        if (e.target.files.length > 0) {
            updateFileCount(e.target.files.length);
            allFiles = Array.from(e.target.files);
        }
    });

    function updateFileCount(count) {
        const uploadText = dropZone.querySelector('div:nth-child(2)');
        uploadText.textContent = `已选择 ${count} 个文件，点击"提取数据"开始处理`;
        uploadText.style.color = '#11998e';
        logDiv.style.display = 'block';
        logDiv.innerHTML = '';
    }

    async function processFiles() {        if (fileInput.files.length === 0) {
            alert('请先选择文件！');
            return;
        }

        processBtn.disabled = true;
        processBtn.textContent = '⏳ 处理中...';
        extractedData = [];
        
        const files = Array.from(fileInput.files);
        
        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            try {
                const result = await readExcel(file);
                extractedData.push({
                    index: i + 1,
                    fileName: file.name,
                    name: result.name,
                    idCard: result.idCard,
                    income: result.income
                });
                
                const status = (result.name && result.idCard) ? 'success' : 'error';
                const msg = result.name && result.idCard ? 
                    `✅ ${file.name}` : 
                    `⚠️ ${file.name} (数据不完整)`;
                addLog(msg, status);
                
            } catch (err) {
                console.error(err);
                addLog(`❌ ${file.name} 读取失败`, 'error');
            }
        }

        // 显示预览表格
        showPreview();
        
        processBtn.disabled = false;
        processBtn.textContent = '🔄 重新提取';
    }

    function readExcel(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];                const jsonData = XLSX.utils.sheet_to_json(worksheet, {header: 1});
                
                let extractedName = '';
                let extractedId = '';
                let extractedIncome = '';

                for (let row of jsonData) {
                    if (row.length < 2) continue;
                    const key = String(row[0]).trim();
                    const value = row[1];

                    if (key.includes('姓名')) {
                        extractedName = value || '';
                    }
                    if (key.includes('身份证')) {
                        extractedId = value ? String(value) : '';
                    }
                    if (key.includes('月收入')) {
                        extractedIncome = value || '';
                    }
                }

                resolve({
                    name: extractedName,
                    idCard: extractedId,
                    income: extractedIncome
                });
            };
            reader.onerror = reject;
            reader.readAsArrayBuffer(file);
        });
    }

    function showPreview() {
        tableBody.innerHTML = '';
        
        extractedData.forEach((row, index) => {
            const tr = document.createElement('tr');
            
            // 高亮显示数据不完整的行
            if (!row.name || !row.idCard) {
                tr.classList.add('highlight');
            }
            
            tr.innerHTML = `
                <td>${index + 1}</td>
                <td title="${row.fileName}">${truncateText(row.fileName, 25)}</td>
                <td>${row.name || '<span class="not-found">未找到</span>'}</td>
                <td>${row.idCard || '<span class="not-found">未找到</span>'}</td>
                <td>${row.income || '<span class="not-found">未找到</span>'}</td>            `;
            tableBody.appendChild(tr);
        });

        const successCount = extractedData.filter(d => d.name && d.idCard).length;
        statsText.textContent = `共 ${extractedData.length} 条 | 成功 ${successCount} 条 | 不完整 ${extractedData.length - successCount} 条`;
        
        previewSection.style.display = 'block';
        previewSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function downloadExcel() {
        if (extractedData.length === 0) {
            alert('没有数据可下载！');
            return;
        }

        const exportData = [
            ['序号', '文件名', '姓名', '身份证号', '月收入']
        ];
        
        extractedData.forEach(row => {
            exportData.push([
                row.index,
                row.fileName,
                row.name,
                row.idCard,
                row.income
            ]);
        });

        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.aoa_to_sheet(exportData);
        
        ws['!cols'] = [
            {wch: 6},   // 序号
            {wch: 30},  // 文件名
            {wch: 12},  // 姓名
            {wch: 25},  // 身份证号
            {wch: 15}   // 月收入
        ];
        
        XLSX.utils.book_append_sheet(wb, ws, "提取结果");
        XLSX.writeFile(wb, `数据提取结果_${new Date().getTime()}.xlsx`);
    }

    function resetAll() {
        fileInput.value = '';
        extractedData = [];
        allFiles = [];        previewSection.style.display = 'none';
        logDiv.innerHTML = '';
        logDiv.style.display = 'none';
        processBtn.textContent = '🔍 提取数据并预览';
        dropZone.querySelector('div:nth-child(2)').textContent = '点击或拖拽文件到此处';
        dropZone.querySelector('div:nth-child(2)').style.color = '#667eea';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function addLog(msg, type) {
        const div = document.createElement('div');
        div.className = 'status-item ' + type;
        div.textContent = msg;
        logDiv.appendChild(div);
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    function truncateText(text, maxLength) {
        if (!text) return '';
        return text.length > maxLength ? text.substring(0, maxLength) + '...' : text;
    }
</script>

</body>
</html>
